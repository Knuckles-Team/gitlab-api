[bumpversion]
current_version = 25.43.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file(all-extra):pyproject.toml]
search = gitlab-api[mcp,agent,gql,logfire]>={current_version}
replace = gitlab-api[mcp,agent,gql,logfire]>={new_version}

[bumpversion:file:a2a.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file:docker/Dockerfile]
search = gitlab-api[all]>={current_version}
replace = gitlab-api[all]>={new_version}

[bumpversion:file:gitlab_api/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:gitlab_api/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
