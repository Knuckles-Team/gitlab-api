---
services:
  gitlab-agent:
    # image: docker.io/knucklessg1/gitlab:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: gitlab-agent
    hostname: gitlab-agent
    command: [ "gitlab-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - "${IP_DNS:-1.1.1.1}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9510"
      - "TRANSPORT=stdio"
      - "GITLAB_INSTANCE=${GITLAB_INSTANCE}"
      - "GITLAB_ACCESS_TOKEN=${GITLAB_ACCESS_TOKEN}"
      - "GITLAB_VERIFY=${GITLAB_VERIFY}"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3.5-35b-a3b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9510:9510"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9510/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
